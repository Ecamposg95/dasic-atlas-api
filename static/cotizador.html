<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador POS - Dasic ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: { colors: { slate: { 850: '#172033', 950: '#020617' } } }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
    <script src="/static/js/auth.js"></script>
</head>
<body class="bg-gray-100 dark:bg-slate-900 text-gray-800 dark:text-gray-100 overflow-hidden h-screen w-screen flex flex-col">

    <!-- Navbar Container -->
    <div id="sidebar-container"></div>

    <!-- Contenido Principal -->
    <main class="flex flex-col lg:flex-row h-full overflow-hidden">
        
        <!-- IZQUIERDA: CATÁLOGO DE PRODUCTOS (60%) -->
        <div class="w-full lg:w-[60%] flex flex-col border-r border-gray-200 dark:border-slate-700 bg-white dark:bg-slate-900 relative">
            
            <!-- Barra de Búsqueda -->
            <div class="p-4 border-b border-gray-200 dark:border-slate-700 bg-gray-50 dark:bg-slate-800 z-10 shadow-sm">
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fas fa-search text-gray-400 text-lg"></i>
                    </div>
                    <input type="text" id="buscadorProductos" 
                           placeholder="Buscar producto..." 
                           class="w-full pl-12 p-3 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-800 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all text-lg shadow-sm"
                           onkeyup="filtrarProductos()" autofocus>
                </div>
            </div>

            <!-- Grid de Productos -->
            <div id="gridProductos" class="flex-1 overflow-y-auto p-4 grid grid-cols-2 md:grid-cols-3 gap-4 content-start bg-gray-100 dark:bg-slate-900 pb-20">
                <!-- Se llena con JS -->
                <div class="col-span-full flex flex-col items-center justify-center text-gray-400 mt-20">
                    <i class="fas fa-circle-notch fa-spin text-4xl mb-4 text-blue-500"></i>
                    <p class="text-lg">Cargando inventario...</p>
                </div>
            </div>
        </div>

        <!-- DERECHA: TICKET DE COTIZACIÓN (40%) -->
        <div class="w-full lg:w-[40%] flex flex-col bg-white dark:bg-slate-850 shadow-2xl z-20 border-l border-gray-200 dark:border-slate-700 h-full relative">
            
            <!-- 1. SELECCIONAR CLIENTE -->
            <div class="p-5 bg-slate-50 dark:bg-slate-800 border-b border-gray-200 dark:border-slate-700">
                <h2 class="text-xs font-bold text-gray-500 uppercase mb-2 tracking-wider">Paso 1: Cliente</h2>
                
                <!-- Buscador -->
                <div class="relative group mb-2">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-user text-gray-400"></i>
                    </div>
                    <input type="text" id="busquedaCliente" placeholder="Buscar Cliente (CRM)..." 
                           class="w-full pl-10 p-2.5 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all" 
                           onkeyup="filtrarClientes()" autocomplete="off">
                    
                    <!-- Dropdown Resultados -->
                    <div id="listaResultadosClientes" class="absolute left-0 right-0 top-full mt-1 bg-white dark:bg-slate-700 border border-gray-200 dark:border-slate-600 shadow-xl rounded-lg max-h-48 overflow-y-auto hidden z-50 divide-y divide-gray-100 dark:divide-slate-600"></div>
                </div>

                <!-- Cliente Seleccionado (Card) -->
                <div id="clienteSeleccionadoInfo" class="hidden bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800 rounded-lg p-3 flex justify-between items-center animate-pulse">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-blue-100 dark:bg-blue-800 flex items-center justify-center text-blue-600 dark:text-blue-200 font-bold">
                            <i class="fas fa-check"></i>
                        </div>
                        <div>
                            <p class="text-[10px] text-blue-500 uppercase font-bold tracking-wider">Cliente Asignado</p>
                            <p id="lblClienteNombre" class="text-sm font-bold text-blue-800 dark:text-blue-200 truncate w-48">Nombre Cliente</p>
                        </div>
                    </div>
                    <button onclick="deseleccionarCliente()" class="text-blue-400 hover:text-blue-600 p-1 hover:bg-blue-100 rounded-full transition"><i class="fas fa-times"></i></button>
                </div>
            </div>

            <!-- 2. LISTA DE PRODUCTOS -->
            <div class="flex-1 flex flex-col overflow-hidden bg-white dark:bg-slate-800">
                <div class="p-3 bg-gray-50 dark:bg-slate-900 border-b border-gray-200 dark:border-slate-700 flex justify-between items-center">
                    <h2 class="text-xs font-bold text-gray-500 uppercase tracking-wider">Paso 2: Productos</h2>
                    <div class="flex gap-2">
                        <select id="monedaSalida" onchange="renderCarrito()" class="text-xs bg-white dark:bg-slate-700 border border-gray-300 dark:border-slate-600 rounded px-2 py-1 outline-none font-bold">
                            <option value="USD">USD ($)</option>
                            <option value="MXN">MXN ($)</option>
                        </select>
                        <input type="number" id="tcDia" value="20.50" onchange="renderCarrito()" class="w-16 text-xs bg-white dark:bg-slate-700 border border-gray-300 dark:border-slate-600 rounded px-2 py-1 text-right outline-none" title="Tipo de Cambio">
                    </div>
                </div>

                <div class="flex-1 overflow-y-auto p-3 space-y-2 bg-slate-50 dark:bg-slate-900/50 custom-scrollbar" id="listaCarrito">
                    <!-- Estado Vacío -->
                    <div class="h-full flex flex-col items-center justify-center text-gray-400 opacity-60">
                        <i class="fas fa-shopping-basket text-5xl mb-3"></i>
                        <p class="font-medium">Carrito vacío</p>
                        <p class="text-xs">Selecciona productos a la izquierda</p>
                    </div>
                </div>
            </div>

            <!-- 3. FOOTER TOTALES -->
            <div class="p-5 bg-white dark:bg-slate-800 border-t border-gray-200 dark:border-slate-700 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] mb-8">
                <div class="space-y-2 mb-5">
                    <div class="flex justify-between items-end">
                        <span class="text-gray-800 dark:text-white font-bold text-lg">TOTAL</span>
                        <span id="lblTotal" class="text-3xl font-black text-blue-600 dark:text-blue-400 tracking-tight">$0.00</span>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="guardarCotizacion('Borrador')" class="py-3.5 rounded-xl font-bold text-slate-600 dark:text-slate-300 bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 transition flex items-center justify-center gap-2">
                        <i class="far fa-save"></i> Draft
                    </button>
                    <button onclick="guardarCotizacion('Finalizar')" class="py-3.5 rounded-xl font-bold text-white bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 shadow-lg shadow-blue-500/30 transition transform active:scale-95 flex items-center justify-center gap-2">
                        Generar PDF <i class="fas fa-arrow-right ml-1"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="/static/js/navbar.js"></script>
    <script src="/static/js/cotizador.js"></script>
</body>
</html>
