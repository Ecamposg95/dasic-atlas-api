<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Clientes CRM - Dasic ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/static/js/auth.js"></script>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden">

    <div id="sidebar-container"></div>

    <main class="flex-1 p-6 overflow-auto">
        <header class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">Cartera de Clientes</h1>
                <p class="text-sm text-gray-500">Gestión de datos y finanzas</p>
            </div>
            <button onclick="modalNuevo()" class="bg-blue-600 text-white px-4 py-2 rounded shadow hover:bg-blue-700 flex items-center gap-2">
                <i class="fas fa-user-plus"></i> Nuevo Cliente
            </button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="gridClientes">
            <div class="text-center col-span-full py-10 text-gray-400">
                <i class="fas fa-spinner fa-spin text-2xl"></i> Cargando clientes...
            </div>
        </div>
    </main>

    <div id="modalCliente" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded shadow-lg w-full max-w-md animate-fade-in-down">
            <h2 class="text-xl font-bold mb-4 text-slate-800 border-b pb-2">Registrar Cliente</h2>
            <form id="formCliente" class="space-y-3">
                <div>
                    <label class="block text-xs font-bold text-gray-500">Empresa / Razón Social</label>
                    <input type="text" id="c_compania" class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500" required>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500">Contacto Principal</label>
                    <input type="text" id="c_nombre" class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500" required>
                </div>
                <div class="flex gap-2">
                    <div class="flex-1">
                        <label class="block text-xs font-bold text-gray-500">Email</label>
                        <input type="email" id="c_email" class="w-full border p-2 rounded">
                    </div>
                    <div class="flex-1">
                        <label class="block text-xs font-bold text-gray-500">Teléfono</label>
                        <input type="text" id="c_tel" class="w-full border p-2 rounded">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500">RFC</label>
                    <input type="text" id="c_rfc" class="w-full border p-2 rounded uppercase">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500">Dirección</label>
                    <textarea id="c_dir" class="w-full border p-2 rounded h-20"></textarea>
                </div>
                <div class="flex items-center gap-2 bg-yellow-50 p-2 rounded border border-yellow-100">
                    <label class="text-xs font-bold text-yellow-800">Días Crédito:</label>
                    <input type="number" id="c_credito" value="30" class="border p-1 rounded w-20 text-center bg-white">
                </div>
                
                <div class="flex justify-end gap-2 mt-4 pt-4 border-t">
                    <button type="button" onclick="cerrarModal()" class="text-gray-500 hover:text-gray-700 px-3 py-1">Cancelar</button>
                    <button type="submit" class="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700 font-bold">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/js/navbar.js"></script>
    <script>
        // Lógica embebida simple para Clientes (o puedes moverla a clientes.js)
        async function cargarClientes() {
            try {
                const res = await fetch('/api/clientes/', { headers: { 'Authorization': `Bearer ${sessionStorage.getItem('token')}` }});
                const clientes = await res.json();
                const grid = document.getElementById('gridClientes');
                grid.innerHTML = '';

                if(clientes.length === 0) {
                    grid.innerHTML = '<p class="col-span-full text-center text-gray-500">No hay clientes registrados.</p>';
                    return;
                }

                clientes.forEach(c => {
                    const card = document.createElement('div');
                    card.className = "bg-white p-5 rounded shadow border hover:shadow-lg transition group relative";
                    card.innerHTML = `
                        <div class="absolute top-4 right-4 text-gray-300 group-hover:text-blue-500 transition"><i class="fas fa-edit cursor-pointer"></i></div>
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <h3 class="font-bold text-lg text-slate-800 leading-tight">${c.compania}</h3>
                                <span class="text-xs bg-slate-100 text-slate-600 px-2 py-0.5 rounded mt-1 inline-block">RFC: ${c.rfc || 'N/A'}</span>
                            </div>
                        </div>
                        <p class="text-sm text-gray-600 mb-1"><i class="fas fa-user-tie w-5 text-center text-gray-400"></i> ${c.nombre}</p>
                        <p class="text-sm text-gray-500 mb-1"><i class="fas fa-envelope w-5 text-center text-gray-400"></i> ${c.email || '-'}</p>
                        <p class="text-sm text-gray-500 mb-3"><i class="fas fa-phone w-5 text-center text-gray-400"></i> ${c.telefono || '-'}</p>
                        
                        <div class="mt-3 pt-3 border-t flex justify-between items-center bg-gray-50 -mx-5 -mb-5 p-4 rounded-b">
                            <div class="text-xs font-bold text-gray-400">Días Crédito: ${c.dias_credito}</div>
                            <div class="text-right">
                                <div class="text-[10px] uppercase font-bold text-gray-400">Saldo Actual</div>
                                <div class="text-lg font-bold ${c.saldo_actual > 0 ? 'text-red-600' : 'text-green-600'}">$${c.saldo_actual?.toFixed(2) || '0.00'}</div>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (e) {
                console.error(e);
            }
        }

        function modalNuevo() { document.getElementById('modalCliente').classList.remove('hidden'); }
        function cerrarModal() { document.getElementById('modalCliente').classList.add('hidden'); }

        document.getElementById('formCliente').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                compania: document.getElementById('c_compania').value,
                nombre: document.getElementById('c_nombre').value,
                email: document.getElementById('c_email').value,
                telefono: document.getElementById('c_tel').value,
                rfc: document.getElementById('c_rfc').value,
                direccion: document.getElementById('c_dir').value,
                dias_credito: parseInt(document.getElementById('c_credito').value)
            };

            const res = await fetch('/api/clientes/', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${sessionStorage.getItem('token')}` 
                },
                body: JSON.stringify(payload)
            });

            if(res.ok) {
                cerrarModal();
                cargarClientes();
                document.getElementById('formCliente').reset();
            } else {
                alert("Error al guardar cliente");
            }
        });

        cargarClientes();
    </script>
</body>
</html>
