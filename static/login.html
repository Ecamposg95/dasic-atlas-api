<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Dasic ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-900 h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-2xl w-96">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-slate-800 tracking-wider">DASIC ERP</h1>
            <p class="text-gray-500 text-sm">Sistema de Gestión Integral v2.0</p>
        </div>
        
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Usuario</label>
                <div class="relative">
                    <i class="fas fa-user absolute left-3 top-3 text-gray-400"></i>
                    <input type="text" id="username" class="w-full pl-10 border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none" placeholder="admin" required>
                </div>
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Contraseña</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-3 top-3 text-gray-400"></i>
                    <input type="password" id="password" class="w-full pl-10 border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none" placeholder="••••••" required>
                </div>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white font-bold p-2 rounded hover:bg-blue-700 transition shadow-lg">
                Iniciar Sesión
            </button>
            <p id="errorMsg" class="text-red-500 text-sm text-center hidden mt-2"><i class="fas fa-exclamation-circle"></i> Credenciales Incorrectas</p>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            try {
                const formData = new URLSearchParams();
                formData.append('username', user);
                formData.append('password', pass);

                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: formData
                });

                if (res.ok) {
                    const data = await res.json();
                    sessionStorage.setItem('token', data.access_token);
                    sessionStorage.setItem('user', user);
                    window.location.href = '/static/index.html';
                } else {
                    errorMsg.classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
                errorMsg.innerText = "Error de conexión con el servidor";
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
