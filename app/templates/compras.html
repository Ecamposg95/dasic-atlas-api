{% extends "base.html" %}
{% block title %}Compras{% endblock %}
{% block page_title %}Compras a Proveedores{% endblock %}

{% block header_actions %}
  <button class="dax-btn-primary">
    <i class="fas fa-plus text-xs"></i>
    Nueva Orden
  </button>
{% endblock %}

{% block content %}
<div x-data="compras()" x-init="init()">

  <!-- Filtros -->
  <div class="flex gap-3 mb-6">
    <div class="relative flex-1 max-w-sm">
      <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
      <input type="search" x-model="q" @input.debounce.300ms="filtrar()"
             placeholder="Proveedor, folio..."
             class="w-full bg-slate-800 border border-slate-700 text-slate-200 placeholder-slate-500
                    rounded-lg pl-8 pr-3 py-2 text-sm focus:outline-none focus:border-cyan-500 transition">
    </div>
  </div>

  <div class="dax-card overflow-hidden">
    <table class="dax-table">
      <thead>
        <tr>
          <th>Folio</th>
          <th>Proveedor</th>
          <th>Fecha</th>
          <th class="text-right">Total</th>
          <th>Estatus</th>
        </tr>
      </thead>
      <tbody>
        <template x-if="loading">
          <template x-for="i in 6" :key="i">
            <tr><td colspan="5">
              <div class="h-8 bg-slate-700/40 animate-pulse rounded my-1"></div>
            </td></tr>
          </template>
        </template>
        <template x-if="!loading">
          <template x-for="c in filtrados" :key="c.id">
            <tr>
              <td class="font-mono text-xs text-cyan-400 font-bold" x-text="c.folio||('#'+c.id)"></td>
              <td class="text-xs text-slate-300" x-text="c.proveedor||'—'"></td>
              <td class="text-xs text-slate-500" x-text="c.fecha ? new Date(c.fecha).toLocaleDateString('es-MX') : '—'"></td>
              <td class="text-right font-mono text-xs font-bold text-slate-200"
                  x-text="'$'+parseFloat(c.total||0).toLocaleString('en-US',{minimumFractionDigits:2})"></td>
              <td>
                <span class="dax-badge-green" x-show="c.estatus==='completada'">Completada</span>
                <span class="dax-badge-amber" x-show="c.estatus==='pendiente'">Pendiente</span>
                <span class="dax-badge-slate" x-show="!c.estatus||c.estatus==='—'" x-text="c.estatus||'—'"></span>
              </td>
            </tr>
          </template>
          <tr x-show="filtrados.length===0">
            <td colspan="5" class="text-center text-slate-500 py-12 text-sm">
              <i class="fas fa-truck text-2xl mb-2 block opacity-30"></i>
              Sin órdenes de compra
            </td>
          </tr>
        </template>
      </tbody>
    </table>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
function compras() {
  return {
    loading: true,
    todos: [], filtrados: [],
    q: '',
    async init() {
      try {
        const res = await fetch('/api/compras/', { credentials:'include' });
        if (res.ok) this.todos = await res.json();
      } catch(e) { console.warn(e); }
      finally { this.loading=false; this.filtrar(); }
    },
    filtrar() {
      const q = this.q.toLowerCase();
      this.filtrados = this.todos.filter(c =>
        !q || (c.proveedor||'').toLowerCase().includes(q) || String(c.folio||'').toLowerCase().includes(q)
      );
    }
  }
}
</script>
{% endblock %}
