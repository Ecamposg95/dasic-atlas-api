<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - DASIC ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 font-sans">

    <script>if (!localStorage.getItem('token')) { window.location.href = "/"; }</script>
    <div id="sidebar-container"></div>

    <main class="ml-64 mt-16 p-6">
        
        <div class="mb-8">
            <h2 class="text-3xl font-bold text-gray-800">Resumen Ejecutivo</h2>
            <p class="text-gray-500">Estado actual de la empresa al <span id="fecha-hoy"></span></p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-blue-600 flex items-center justify-between">
                <div>
                    <p class="text-xs font-bold text-gray-400 uppercase">Ventas (Mes)</p>
                    <h3 class="text-2xl font-bold text-gray-800" id="kpi-ventas">$0.00</h3>
                </div>
                <div class="p-3 bg-blue-50 rounded-full text-blue-600">
                    <i class="fas fa-chart-line text-xl"></i>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-yellow-500 flex items-center justify-between">
                <div>
                    <p class="text-xs font-bold text-gray-400 uppercase">Cotizaciones</p>
                    <h3 class="text-2xl font-bold text-gray-800" id="kpi-cotizaciones">0</h3>
                </div>
                <div class="p-3 bg-yellow-50 rounded-full text-yellow-600">
                    <i class="fas fa-file-invoice text-xl"></i>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-purple-500 flex items-center justify-between">
                <div>
                    <p class="text-xs font-bold text-gray-400 uppercase">Clientes Activos</p>
                    <h3 class="text-2xl font-bold text-gray-800" id="kpi-clientes">0</h3>
                </div>
                <div class="p-3 bg-purple-50 rounded-full text-purple-600">
                    <i class="fas fa-users text-xl"></i>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-red-500 flex items-center justify-between">
                <div>
                    <p class="text-xs font-bold text-gray-400 uppercase">Stock Crítico</p>
                    <h3 class="text-2xl font-bold text-red-600" id="kpi-stock">0</h3>
                </div>
                <div class="p-3 bg-red-50 rounded-full text-red-600">
                    <i class="fas fa-exclamation-triangle text-xl"></i>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow-sm">
                <h3 class="font-bold text-gray-700 mb-4">Tendencia de Ventas (Últimos 6 meses)</h3>
                <div class="h-64">
                    <canvas id="salesChart"></canvas>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm">
                <h3 class="font-bold text-gray-700 mb-4">Actividad Reciente</h3>
                <div class="overflow-y-auto h-64">
                    <table class="w-full text-sm text-left">
                        <tbody id="tabla-recientes">
                            <tr><td class="text-gray-400 text-center">Cargando...</td></tr>
                        </tbody>
                    </table>
                </div>
                <div class="mt-4 text-center">
                    <a href="/ventas/cotizador" class="text-blue-600 text-xs font-bold hover:underline">Ir a Ventas →</a>
                </div>
            </div>
        </div>

    </main>

    <script src="/static/js/navbar.js"></script>

    <script>
        const token = localStorage.getItem('token');

        document.addEventListener('DOMContentLoaded', () => {
            // Poner fecha
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('fecha-hoy').innerText = new Date().toLocaleDateString('es-ES', options);
            
            cargarDatosDashboard();
        });

        async function cargarDatosDashboard() {
            try {
                // Hacemos peticiones en paralelo para velocidad
                const [resVentas, resProds, resClientes] = await Promise.all([
                    fetch('/api/ventas/historial?limit=100', { headers: { 'Authorization': `Bearer ${token}` } }),
                    fetch('/api/productos/?limit=1000', { headers: { 'Authorization': `Bearer ${token}` } }),
                    fetch('/api/clientes/?limit=1', { headers: { 'Authorization': `Bearer ${token}` } }) // Solo para ver si conecta, el conteo real lo sacamos de otra forma si la API no tiene endpoint de count
                ]);

                const ventas = await resVentas.json();
                const productos = await resProds.json();
                
                // 1. CALCULAR KPI STOCK
                const stockBajo = productos.filter(p => p.stock_actual <= p.stock_minimo).length;
                document.getElementById('kpi-stock').innerText = stockBajo;

                // 2. CALCULAR KPI CLIENTES (Simulado con el length del array si trajéramos todos, o un estimado)
                // Nota: Para ser exactos, tu API de clientes debería devolver un campo "total". 
                // Por ahora mostramos "Activos" como placeholder o contamos ventas únicas.
                const clientesUnicos = new Set(ventas.map(v => v.cliente)).size;
                document.getElementById('kpi-clientes').innerText = clientesUnicos;

                // 3. KPI VENTAS MES
                const hoy = new Date();
                const mesActual = hoy.getMonth();
                const anioActual = hoy.getFullYear();

                let totalMes = 0;
                let conteoCotizaciones = 0;
                let ventasPorMes = Array(6).fill(0); // Últimos 6 meses
                const etiquetasMeses = [];

                // Generar etiquetas de últimos 6 meses
                for (let i = 5; i >= 0; i--) {
                    const d = new Date(hoy.getFullYear(), hoy.getMonth() - i, 1);
                    etiquetasMeses.push(d.toLocaleString('es-ES', { month: 'short' }));
                }

                ventas.forEach(v => {
                    const fechaVenta = new Date(v.fecha);
                    
                    // Sumar si es de este mes y es venta (no cotización)
                    if (v.estatus !== 'cotizacion' && fechaVenta.getMonth() === mesActual && fechaVenta.getFullYear() === anioActual) {
                        totalMes += parseFloat(v.total);
                    }

                    if (v.estatus === 'cotizacion') conteoCotizaciones++;

                    // Llenar gráfica (Simplificado)
                    // Calcula diferencia de meses respecto a hoy para ubicar en el array [0-5]
                    const diffMeses = (anioActual - fechaVenta.getFullYear()) * 12 + (mesActual - fechaVenta.getMonth());
                    if (diffMeses >= 0 && diffMeses < 6 && v.estatus !== 'cotizacion') {
                        ventasPorMes[5 - diffMeses] += parseFloat(v.total);
                    }
                });

                document.getElementById('kpi-ventas').innerText = `$${totalMes.toLocaleString('en-US', {minimumFractionDigits:2})}`;
                document.getElementById('kpi-cotizaciones').innerText = conteoCotizaciones;

                // 4. TABLA RECIENTES
                const tbody = document.getElementById('tabla-recientes');
                tbody.innerHTML = '';
                ventas.slice(0, 5).forEach(v => {
                    const color = v.estatus === 'cotizacion' ? 'text-yellow-600 bg-yellow-50' : 'text-green-600 bg-green-50';
                    const icon = v.estatus === 'cotizacion' ? 'fa-file-alt' : 'fa-check-circle';
                    
                    tbody.innerHTML += `
                        <tr class="border-b border-gray-50 last:border-0">
                            <td class="py-3">
                                <div class="flex items-center">
                                    <div class="w-8 h-8 rounded-full ${color} flex items-center justify-center mr-3">
                                        <i class="fas ${icon} text-xs"></i>
                                    </div>
                                    <div>
                                        <p class="font-bold text-gray-800 text-xs">${v.folio}</p>
                                        <p class="text-xs text-gray-500 truncate w-24">${v.cliente}</p>
                                    </div>
                                </div>
                            </td>
                            <td class="text-right font-mono text-xs font-bold text-gray-700">
                                $${parseFloat(v.total).toLocaleString('en-US')}
                            </td>
                        </tr>
                    `;
                });

                // 5. RENDERIZAR GRÁFICA
                renderChart(etiquetasMeses, ventasPorMes);

            } catch (error) {
                console.error(error);
            }
        }

        function renderChart(labels, data) {
            const ctx = document.getElementById('salesChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Ventas ($)',
                        data: data,
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37, 99, 235, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { borderDash: [2, 4] } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }
    </script>
</body>
</html>
