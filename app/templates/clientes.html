{% extends "base.html" %}
{% block title %}Clientes{% endblock %}
{% block page_title %}Clientes{% endblock %}

{% block header_actions %}
  <button id="btn-nuevo-cliente"
          class="dax-btn-primary"
          onclick="document.getElementById('modal-cliente').classList.remove('hidden')">
    <i class="fas fa-plus text-xs"></i>
    Nuevo Cliente
  </button>
{% endblock %}

{% block content %}
<div x-data="clientes()" x-init="init()">

  <!-- Filtros -->
  <div class="flex flex-col sm:flex-row gap-3 mb-6">
    <div class="relative flex-1 max-w-sm">
      <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
      <input type="search"
             x-model="busqueda"
             @input.debounce.300ms="filtrar()"
             placeholder="Buscar por nombre, RFC, contacto..."
             class="w-full bg-slate-800 border border-slate-700 text-slate-200
                    placeholder-slate-500 rounded-lg pl-8 pr-3 py-2 text-sm
                    focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500/30 transition">
    </div>
    <select x-model="tipoFiltro" @change="filtrar()"
            class="bg-slate-800 border border-slate-700 text-slate-300 text-sm
                   rounded-lg px-3 py-2 focus:outline-none focus:border-cyan-500 transition">
      <option value="">Todos los tipos</option>
      <option value="industrial">Industrial</option>
      <option value="gobierno">Gobierno</option>
      <option value="comercial">Comercial</option>
    </select>
  </div>

  <!-- Tabla -->
  <div class="dax-card overflow-hidden">
    <table class="dax-table">
      <thead>
        <tr>
          <th>Cliente</th>
          <th>RFC</th>
          <th>Contacto</th>
          <th>Ciudad</th>
          <th>Estatus</th>
          <th class="text-right">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <!-- Skeleton -->
        <template x-if="loading">
          <template x-for="i in 6" :key="i">
            <tr>
              <td colspan="6">
                <div class="flex items-center gap-3 animate-pulse py-2">
                  <div class="h-8 w-8 rounded-lg bg-slate-700 shrink-0"></div>
                  <div class="flex-1 h-3 bg-slate-700 rounded"></div>
                </div>
              </td>
            </tr>
          </template>
        </template>
        <!-- Datos -->
        <template x-if="!loading">
          <template x-for="c in filtrados" :key="c.id">
            <tr>
              <td>
                <div class="flex items-center gap-3">
                  <div class="h-8 w-8 shrink-0 flex items-center justify-center
                              rounded-lg bg-violet-500/15 text-violet-400 text-xs font-bold">
                    <span x-text="c.nombre ? c.nombre[0].toUpperCase() : '?'"></span>
                  </div>
                  <div>
                    <p class="font-medium text-slate-200 text-xs" x-text="c.nombre"></p>
                    <p class="text-[10px] text-slate-500" x-text="c.email || '—'"></p>
                  </div>
                </div>
              </td>
              <td class="font-mono text-xs text-slate-400" x-text="c.rfc || '—'"></td>
              <td class="text-xs" x-text="c.contacto_principal || '—'"></td>
              <td class="text-xs" x-text="c.ciudad || '—'"></td>
              <td>
                <span class="dax-badge-green" x-show="c.activo">Activo</span>
                <span class="dax-badge-slate" x-show="!c.activo">Inactivo</span>
              </td>
              <td class="text-right">
                <button class="dax-btn-ghost text-xs py-1 px-2"
                        @click="editar(c)">
                  <i class="fas fa-pen-to-square"></i>
                </button>
              </td>
            </tr>
          </template>
          <tr x-show="filtrados.length===0">
            <td colspan="6" class="text-center text-slate-500 py-12 text-sm">
              <i class="fas fa-users text-2xl mb-2 block opacity-30"></i>
              Sin clientes registrados
            </td>
          </tr>
        </template>
      </tbody>
    </table>
  </div>
</div>

<!-- Modal Nuevo Cliente (stub) -->
<div id="modal-cliente"
     class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm">
  <div class="dax-card w-full max-w-lg p-6 m-4">
    <div class="flex items-center justify-between mb-5">
      <h2 class="text-base font-bold text-slate-200">Nuevo Cliente</h2>
      <button onclick="document.getElementById('modal-cliente').classList.add('hidden')"
              class="dax-btn-ghost p-2 rounded-lg">
        <i class="fas fa-xmark"></i>
      </button>
    </div>
    <div class="space-y-4">
      <div>
        <label class="block mb-1.5 text-xs font-semibold text-slate-400 uppercase tracking-wider">Nombre / Razón Social</label>
        <input type="text" placeholder="ACME Industrial SA de CV" class="dax-input">
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block mb-1.5 text-xs font-semibold text-slate-400 uppercase tracking-wider">RFC</label>
          <input type="text" placeholder="ACM010101AAA" class="dax-input font-mono">
        </div>
        <div>
          <label class="block mb-1.5 text-xs font-semibold text-slate-400 uppercase tracking-wider">Ciudad</label>
          <input type="text" placeholder="Monterrey" class="dax-input">
        </div>
      </div>
      <div>
        <label class="block mb-1.5 text-xs font-semibold text-slate-400 uppercase tracking-wider">Email</label>
        <input type="email" placeholder="contacto@empresa.com" class="dax-input">
      </div>
    </div>
    <div class="flex justify-end gap-3 mt-6">
      <button onclick="document.getElementById('modal-cliente').classList.add('hidden')"
              class="dax-btn-ghost">Cancelar</button>
      <button class="dax-btn-primary">
        <i class="fas fa-save text-xs"></i>
        Guardar
      </button>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
function clientes() {
  return {
    loading: true,
    todos: [],
    filtrados: [],
    busqueda: '',
    tipoFiltro: '',

    async init() {
      try {
        const res = await fetch('/api/clientes/', { credentials:'include' });
        if (res.ok) this.todos = await res.json();
      } catch(e) { console.warn(e); }
      finally { this.loading = false; this.filtrar(); }
    },

    filtrar() {
      const q = this.busqueda.toLowerCase();
      this.filtrados = this.todos.filter(c =>
        (!q || (c.nombre||'').toLowerCase().includes(q) || (c.rfc||'').toLowerCase().includes(q))
      );
    },

    editar(c) { console.log('Editar', c.id); }
  }
}
</script>
{% endblock %}
