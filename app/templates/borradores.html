{% extends "base.html" %}
{% block title %}Borradores · DASIC{% endblock %}
{% block content %}
<div class="p-6 max-w-6xl mx-auto">
  <header class="flex items-center justify-between mb-4">
    <h1 class="text-2xl font-medium text-slate-800 dark:text-slate-100">
      <i class="fas fa-layer-group mr-2 text-cyan-500"></i>Borradores apilados
    </h1>
    <a href="/ventas/cotizador" class="dax-btn-primary">
      <i class="fas fa-plus mr-1"></i> Nueva cotización
    </a>
  </header>

  <div class="bg-white dark:bg-slate-800 rounded-lg shadow-sm p-4 mb-4">
    <div class="flex flex-wrap items-center gap-2">
      <input type="text" id="filtro-cliente" placeholder="Buscar cliente…"
             class="bg-slate-50 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded px-3 py-1.5 text-sm focus:ring-2 focus:ring-cyan-500 outline-none flex-1 min-w-[180px]">
      <select id="filtro-moneda"
              class="bg-slate-50 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded px-2 py-1.5 text-sm">
        <option value="">Todas las monedas</option>
        <option value="MXN">MXN</option>
        <option value="USD">USD</option>
      </select>
      <select id="filtro-antiguedad"
              class="bg-slate-50 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded px-2 py-1.5 text-sm">
        <option value="">Cualquier antigüedad</option>
        <option value="3">&gt; 3 días</option>
        <option value="7">&gt; 7 días</option>
        <option value="14">&gt; 14 días</option>
      </select>
      <span class="ml-auto text-xs text-slate-500" id="count-resultados"></span>
    </div>
  </div>

  <div class="bg-white dark:bg-slate-800 rounded-lg shadow-sm overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-slate-50 dark:bg-slate-900 text-xs text-slate-500 dark:text-slate-400 uppercase">
        <tr>
          <th class="text-left p-3">Folio</th>
          <th class="text-left p-3">Cliente</th>
          <th class="text-right p-3">Edad</th>
          <th class="text-right p-3">Líneas</th>
          <th class="text-right p-3">Total</th>
          <th class="text-center p-3">Moneda</th>
          <th class="text-center p-3">PDF</th>
          <th class="text-right p-3">Acciones</th>
        </tr>
      </thead>
      <tbody id="tbody-borradores" class="divide-y divide-slate-100 dark:divide-slate-700">
        <tr><td colspan="8" class="p-8 text-center text-slate-400">
          <i class="fas fa-spinner fa-spin"></i> Cargando…
        </td></tr>
      </tbody>
    </table>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
  let __borradoresAll = [];

  async function cargarBorradoresPagina() {
    const tbody = document.getElementById('tbody-borradores');
    try {
      const r = await fetch('/api/ventas/borradores?page=1&page_size=200', { credentials: 'include' });
      if (!r.ok) {
        tbody.innerHTML = '<tr><td colspan="8" class="p-8 text-center text-rose-500">Error al cargar borradores.</td></tr>';
        return;
      }
      const data = await r.json();
      __borradoresAll = data.items || [];
      renderTabla();
    } catch (e) {
      console.error(e);
      tbody.innerHTML = '<tr><td colspan="8" class="p-8 text-center text-rose-500">Error al cargar borradores.</td></tr>';
    }
  }

  function renderTabla() {
    const fc = (document.getElementById('filtro-cliente').value || '').toLowerCase();
    const fm = document.getElementById('filtro-moneda').value || '';
    const fa = parseInt(document.getElementById('filtro-antiguedad').value || '0');

    const filtered = __borradoresAll.filter(b => {
      if (fc && !((b.cliente_nombre || '').toLowerCase().includes(fc))) return false;
      if (fm && b.moneda !== fm) return false;
      if (fa && (b.edad_dias || 0) < fa) return false;
      return true;
    });

    document.getElementById('count-resultados').textContent =
      `${filtered.length} de ${__borradoresAll.length} borrador${__borradoresAll.length === 1 ? '' : 'es'}`;

    const tbody = document.getElementById('tbody-borradores');
    if (filtered.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8" class="p-8 text-center text-slate-400"><i class="fas fa-inbox mr-1"></i> Sin borradores apilados.</td></tr>';
      return;
    }
    tbody.innerHTML = filtered.map(b => `
      <tr class="hover:bg-slate-50 dark:hover:bg-slate-700/50">
        <td class="p-3 font-mono text-xs">${b.folio || ''}</td>
        <td class="p-3">${b.cliente_nombre || '<span class="text-slate-400">— Sin cliente</span>'}</td>
        <td class="p-3 text-right text-slate-500">${b.edad_dias === 0 ? 'hoy' : (b.edad_dias || 0) + 'd'}</td>
        <td class="p-3 text-right">${b.lineas_count || 0}</td>
        <td class="p-3 text-right">$${(b.total || 0).toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</td>
        <td class="p-3 text-center"><span class="text-xs font-mono">${b.moneda || ''}</span></td>
        <td class="p-3 text-center">
          ${b.pdf_desactualizado
            ? '<span class="text-amber-600" title="PDF desactualizado"><i class="fas fa-triangle-exclamation"></i></span>'
            : '<span class="text-emerald-600" title="PDF al día"><i class="fas fa-check"></i></span>'}
        </td>
        <td class="p-3 text-right space-x-2">
          <a href="/ventas/cotizador?id=${b.id}" class="text-cyan-600 hover:underline text-xs"><i class="fas fa-pen-to-square"></i> Editar</a>
          <a href="/api/ventas/${b.id}/pdf" target="_blank" class="text-slate-500 hover:underline text-xs"><i class="fas fa-file-pdf"></i> PDF</a>
        </td>
      </tr>
    `).join('');
  }

  // Listeners de filtros
  document.getElementById('filtro-cliente').addEventListener('input', () => renderTabla());
  document.getElementById('filtro-moneda').addEventListener('change', () => renderTabla());
  document.getElementById('filtro-antiguedad').addEventListener('change', () => renderTabla());

  // Carga inicial
  cargarBorradoresPagina();
</script>
{% endblock %}
