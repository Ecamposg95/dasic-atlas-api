{% extends "base.html" %}
{% block title %}Equipo{% endblock %}
{% block page_title %}Gestión de Equipo{% endblock %}

{% block header_actions %}
  <button class="dax-btn-primary"
          onclick="document.getElementById('modal-usuario').classList.remove('hidden')">
    <i class="fas fa-user-plus text-xs"></i>
    Nuevo Usuario
  </button>
{% endblock %}

{% block content %}
<div x-data="usuarios()" x-init="init()">

  <div class="dax-card overflow-hidden">
    <table class="dax-table">
      <thead>
        <tr>
          <th>Usuario</th>
          <th>Rol</th>
          <th>Organización</th>
          <th>Estatus</th>
          <th class="text-right">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <template x-if="loading">
          <template x-for="i in 5" :key="i">
            <tr><td colspan="5">
              <div class="h-8 bg-slate-700/40 animate-pulse rounded my-1"></div>
            </td></tr>
          </template>
        </template>
        <template x-if="!loading">
          <template x-for="u in lista" :key="u.id">
            <tr>
              <td>
                <div class="flex items-center gap-3">
                  <div class="h-8 w-8 shrink-0 flex items-center justify-center rounded-full
                              bg-gradient-to-br from-cyan-500 to-blue-600 text-white text-xs font-bold">
                    <span x-text="u.nombre ? u.nombre[0].toUpperCase() : 'U'"></span>
                  </div>
                  <div>
                    <p class="text-xs font-medium text-slate-200" x-text="u.nombre"></p>
                    <p class="text-[10px] text-slate-500" x-text="u.email"></p>
                  </div>
                </div>
              </td>
              <td>
                <span class="dax-badge-slate text-[10px] uppercase" x-text="u.rol"></span>
              </td>
              <td class="text-xs text-slate-400" x-text="u.organization_id ? u.organization_id.slice(0,8)+'...' : '—'"></td>
              <td>
                <span class="dax-badge-green" x-show="u.activo">Activo</span>
                <span class="dax-badge-slate" x-show="!u.activo">Inactivo</span>
              </td>
              <td class="text-right">
                <button class="dax-btn-ghost text-xs py-1 px-2">
                  <i class="fas fa-pen-to-square"></i>
                </button>
              </td>
            </tr>
          </template>
        </template>
      </tbody>
    </table>
  </div>

</div>

<!-- Modal Nuevo Usuario -->
<div id="modal-usuario"
     class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm">
  <div class="dax-card w-full max-w-md p-6 m-4">
    <div class="flex items-center justify-between mb-5">
      <h2 class="text-base font-bold text-slate-200">Nuevo Usuario</h2>
      <button onclick="document.getElementById('modal-usuario').classList.add('hidden')"
              class="dax-btn-ghost p-2 rounded-lg">
        <i class="fas fa-xmark"></i>
      </button>
    </div>
    <div class="space-y-4">
      <div>
        <label class="block mb-1.5 text-xs font-semibold text-slate-400 uppercase tracking-wider">Nombre Completo</label>
        <input type="text" placeholder="Juan García" class="dax-input">
      </div>
      <div>
        <label class="block mb-1.5 text-xs font-semibold text-slate-400 uppercase tracking-wider">Email</label>
        <input type="email" placeholder="juan@dasic.com" class="dax-input">
      </div>
      <div>
        <label class="block mb-1.5 text-xs font-semibold text-slate-400 uppercase tracking-wider">Contraseña temporal</label>
        <input type="password" placeholder="••••••••" class="dax-input">
      </div>
      <div>
        <label class="block mb-1.5 text-xs font-semibold text-slate-400 uppercase tracking-wider">Rol</label>
        <select class="dax-input bg-slate-700/50">
          <option value="VENTAS">Ventas</option>
          <option value="ADMIN">Administrador</option>
          <option value="BODEGA">Bodeguero</option>
          <option value="DIRECTOR">Director</option>
        </select>
      </div>
    </div>
    <div class="flex justify-end gap-3 mt-6">
      <button onclick="document.getElementById('modal-usuario').classList.add('hidden')"
              class="dax-btn-ghost">Cancelar</button>
      <button class="dax-btn-primary">
        <i class="fas fa-save text-xs"></i>
        Crear Usuario
      </button>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
function usuarios() {
  return {
    loading: true,
    lista: [],
    async init() {
      try {
        const res = await fetch('/api/usuarios/', { credentials:'include' });
        if (res.ok) this.lista = await res.json();
      } catch(e) { console.warn(e); }
      finally { this.loading = false; }
    }
  }
}
</script>
{% endblock %}
